name: Update Daily Blurb

on:
  schedule:
    - cron: '0 0 * * *'   # midnight UTC every day
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select and write today's blurb to today.json
        run: swift pick_blurb.swift

      - name: Commit and push today.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add today.json
          git diff --staged --quiet || git commit -m "Update daily blurb: $(date -u +%Y-%m-%d)"
          git push
