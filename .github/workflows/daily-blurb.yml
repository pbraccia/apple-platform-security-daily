name: Daily Blurb

on:
  schedule:
    - cron: '0 0 * * *'   # midnight UTC every day
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate today's blurb
        run: swift pick_blurb.swift

      - name: Commit and push today.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add today.json
          git diff --staged --quiet || git commit -m "Daily blurb: $(date -u +%Y-%m-%d)"
          git push
